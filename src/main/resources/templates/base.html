<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="Layout(content)">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Smart Contact Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <a class="navbar-brand" th:href="@{/}">Smart Contact Manager</a>

    <button class="btn btn-outline-dark ml-3" id="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/signup}">Sign Up</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
        </ul>
    </div>
</nav>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar" id="sidebar">
<span class="close-btn" id="close-btn">&times;</span>
    <a id="home-link" th:href="@{/user/index}"><i class="fas fa-home mr-2"></i> Dashboard</a>
    <a th:href="@{/user/show-contacts/0}"><i class="fas fa-address-book mr-2"></i> View Contacts</a>
    <a th:href="@{/user/add-contact}"><i class="fas fa-plus-circle mr-2"></i> Add Contact</a>
    <a th:href="@{/user/profile}"><i class="fas fa-user mr-2"></i> Your Profile</a>
    <a th:href="@{/user/settings}"><i class="fas fa-cog mr-2"></i> Settings</a>
    <a th:href="@{/logout}"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
</div>


<!-- ================= PAGE CONTENT ================= -->
<div class="container" id="page-content" style="margin-top:80px;">
    <div th:replace="${content}"></div>
</div>

<!-- ================= JS ================= -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>

<script>
    $("#menu-toggle").click(function () {
        $("#sidebar").addClass("active");
    });

    $("#close-btn").click(function () {
        $("#sidebar").removeClass("active");
    });
</script>

</body>
</html>
